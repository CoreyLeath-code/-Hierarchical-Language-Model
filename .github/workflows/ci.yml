name: 9 Tier Deployment Hygiene

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hygiene:
    name: Hygiene Gate (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Tier 1 - Checkout source
        uses: actions/checkout@v4

      - name: Tier 2 - Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Tier 3 - Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Tier 4 - Static lint
        run: ruff check api hierarchical_lm benchmarks tests

      - name: Tier 5 - Format verification
        run: ruff format --check api hierarchical_lm benchmarks tests

      - name: Tier 6 - Python import compilation
        run: python -m compileall -q api hierarchical_lm benchmarks tests

      - name: Tier 7 - Unit, API contract, and coverage tests
        run: pytest --cov=api --cov=hierarchical_lm --cov-report=term-missing

      - name: Tier 8 - Benchmark JSON generation and validation
        run: |
          python benchmarks/benchmark_hlm.py --iterations 100 --output benchmark-results.json
          python -m json.tool benchmark-results.json > /tmp/benchmark-results.pretty.json

      - name: Tier 9 - Deployment and security hygiene
        run: |
          docker build -t hlm:${{ github.sha }} .
          bandit -r api hierarchical_lm benchmarks -ll
          pip-audit --cache-dir .pip-audit-cache -r requirements.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: hlm-benchmark-results-${{ matrix.python-version }}
          path: benchmark-results.json

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## 9 Tier Deployment Hygiene Summary"
            echo ""
            echo "| Tier | Gate |"
            echo "|---:|---|"
            echo "| 1 | Checkout source |"
            echo "| 2 | Python runtime setup with pip cache |"
            echo "| 3 | Dependency installation |"
            echo "| 4 | Ruff static lint |"
            echo "| 5 | Ruff format verification |"
            echo "| 6 | Python import compilation |"
            echo "| 7 | Unit/API/coverage tests |"
            echo "| 8 | Benchmark JSON generation and validation |"
            echo "| 9 | Docker build, Bandit scan, and pip-audit |"
          } >> "$GITHUB_STEP_SUMMARY"
